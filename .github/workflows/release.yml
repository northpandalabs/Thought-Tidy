name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build both targets
        run: npm run build

      - name: Zip Chrome build
        run: cd dist/chrome && zip -r ../../brainfixai-chrome.zip . && cd ../..

      - name: Zip Firefox build
        run: cd dist/firefox && zip -r ../../brainfixai-firefox.zip . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            brainfixai-chrome.zip
            brainfixai-firefox.zip
          generate_release_notes: true
