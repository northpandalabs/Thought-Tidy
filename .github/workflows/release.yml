name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Extensions (single Linux runner, no native deps) ───────────────────────
  extensions:
    name: Build extensions
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Zip Chrome
        run: cd dist/chrome && zip -r ../../blur-to-clear-chrome.zip . && cd ../..

      - name: Zip Firefox
        run: cd dist/firefox && zip -r ../../blur-to-clear-firefox.zip . && cd ../..

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            blur-to-clear-chrome.zip
            blur-to-clear-firefox.zip
          generate_release_notes: true

  # ── Desktop — one job per platform so we get native binaries ───────────────
  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: blur-to-clear-windows
            glob: "desktop/dist-build/*.exe"
          - os: macos-latest
            artifact: blur-to-clear-mac
            glob: "desktop/dist-build/*.dmg"
          - os: ubuntu-latest
            artifact: blur-to-clear-linux
            glob: "desktop/dist-build/*.{AppImage,deb}"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: Build desktop app
        run: npm run dist
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.glob }}
