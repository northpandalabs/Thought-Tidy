name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Extensions (single Linux runner, no native deps) ───────────────────────
  extensions:
    name: Build extensions
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set release version from tag
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          for (const f of ['package.json', 'desktop/package.json']) {
            try {
              const p = JSON.parse(fs.readFileSync(f, 'utf8'));
              p.version = tag;
              fs.writeFileSync(f, JSON.stringify(p, null, 2) + '\n');
              console.log('Set', f, 'to', tag);
            } catch (_) {}
          }
          EOF

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Zip Chrome
        run: cd dist/chrome && zip -r ../../blur-to-clear-chrome.zip . && cd ../..

      - name: Zip Firefox
        run: cd dist/firefox && zip -r ../../blur-to-clear-firefox.zip . && cd ../..

      - name: Attach to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            blur-to-clear-chrome.zip
            blur-to-clear-firefox.zip
          generate_release_notes: true

  # ── Desktop — one job per platform so we get native binaries ───────────────
  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: blur-to-clear-windows
            glob: "desktop/dist-build/*.exe"
          - os: macos-latest
            artifact: blur-to-clear-mac
            glob: "desktop/dist-build/*.dmg"
          - os: ubuntu-latest
            artifact: blur-to-clear-linux
            glob: "desktop/dist-build/*.{AppImage,deb}"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set release version from tag
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          const p = JSON.parse(fs.readFileSync('desktop/package.json', 'utf8'));
          p.version = tag;
          fs.writeFileSync('desktop/package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('Set desktop/package.json to', tag);
          EOF

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: Build desktop app
        run: npm run dist
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate installer artifact
        shell: bash
        run: |
          shopt -s nullglob extglob
          files=(desktop/dist-build/*.exe desktop/dist-build/*.dmg desktop/dist-build/*.deb desktop/dist-build/*.AppImage)
          found=()
          for f in "${files[@]}"; do [ -f "$f" ] && found+=("$f"); done
          if [ ${#found[@]} -eq 0 ]; then
            echo "ERROR: No installer found in desktop/dist-build/"; exit 1
          fi
          for f in "${found[@]}"; do
            mb=$(( $(wc -c < "$f") / 1048576 ))
            echo "Artifact: $(basename "$f") (${mb} MB)"
            if [ "$mb" -lt 30 ]; then
              echo "ERROR: $(basename "$f") is only ${mb}MB — build may be broken"; exit 1
            fi
          done

      - name: Attach to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.glob }}
