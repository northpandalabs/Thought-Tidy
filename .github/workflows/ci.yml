name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Extension tests + builds ───────────────────────────────────────────────
  extensions:
    name: Extensions (Chrome + Firefox)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (121)
        run: npm test

      - name: Build Chrome
        run: npm run build:chrome

      - name: Build Firefox
        run: npm run build:firefox

      - name: Upload Chrome build
        uses: actions/upload-artifact@v4
        with:
          name: blur-to-clear-chrome
          path: dist/chrome/

      - name: Upload Firefox build
        uses: actions/upload-artifact@v4
        with:
          name: blur-to-clear-firefox
          path: dist/firefox/

  # ── Desktop tests ──────────────────────────────────────────────────────────
  desktop-tests:
    name: Desktop tests (55)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Run desktop tests
        run: npm test
        working-directory: desktop
