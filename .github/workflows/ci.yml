name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Chrome
        run: npm run build:chrome

      - name: Build Firefox
        run: npm run build:firefox

      - name: Upload Chrome build
        uses: actions/upload-artifact@v4
        with:
          name: brainfixai-chrome
          path: dist/chrome/

      - name: Upload Firefox build
        uses: actions/upload-artifact@v4
        with:
          name: brainfixai-firefox
          path: dist/firefox/
