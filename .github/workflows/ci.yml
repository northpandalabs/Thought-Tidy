name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Extension tests + Firefox build ───────────────────────────────────────
  extensions:
    name: Extensions (Firefox)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Build Firefox
        run: npm run build:firefox

      - name: Validate Firefox manifest
        run: |
          node -e "
            const m = require('./dist/firefox/manifest.json');
            if (![2,3].includes(m.manifest_version)) throw new Error('manifest_version must be 2 or 3, got ' + m.manifest_version);
            const allowed = ['contextMenus','scripting','storage','activeTab','alarms'];
            const bad = (m.permissions || []).filter(p => !allowed.includes(p));
            if (bad.length) throw new Error('Unexpected permissions: ' + bad.join(', '));
            console.log('Firefox manifest OK  version=' + m.manifest_version + '  permissions=' + (m.permissions||[]).join(','));
          "

      - name: Upload Firefox zip
        uses: actions/upload-artifact@v7
        with:
          name: blur-to-clear-firefox-${{ github.sha }}
          path: dist/firefox/
          retention-days: 14

  # ── Desktop tests + Windows TEST ONLY build ───────────────────────────────
  desktop:
    name: Desktop (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Run desktop tests with coverage
        run: npm test -- --coverage
        working-directory: desktop

      - name: Stamp build version with commit hash
        id: ver
        shell: bash
        run: |
          SHA="${GITHUB_SHA:0:8}"
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          node - << 'EOF'
          const fs = require('fs');
          const sha = process.env.GITHUB_SHA.slice(0, 8);
          const p = JSON.parse(fs.readFileSync('desktop/package.json', 'utf8'));
          const base = p.version.split('+')[0];
          p.version = base + '+' + sha;
          fs.writeFileSync('desktop/package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('Stamped version:', p.version);
          EOF

      - name: Build TEST ONLY portable EXE
        run: npm run dist:test
        working-directory: desktop

      - name: Zip TEST ONLY EXE
        shell: pwsh
        run: |
          $sha = "${{ steps.ver.outputs.sha }}"
          $exe = Get-ChildItem -Path "desktop/dist-build-test" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in desktop/dist-build-test" }
          Compress-Archive -Path $exe.FullName -DestinationPath "blur-to-clear-TEST-ONLY-$sha.zip"
          Write-Host "Zipped: $($exe.Name) -> blur-to-clear-TEST-ONLY-$sha.zip"

      - name: Upload TEST ONLY zip
        uses: actions/upload-artifact@v7
        with:
          name: blur-to-clear-TEST-ONLY-${{ steps.ver.outputs.sha }}
          path: blur-to-clear-TEST-ONLY-${{ steps.ver.outputs.sha }}.zip
          retention-days: 14
