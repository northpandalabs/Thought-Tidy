<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Blur-to-Clear</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="../icons/icon.svg" class="logo-img" alt="">
    Blur-to-Clear
  </div>

  <!-- First-run CTA: shown when no API key is configured -->
  <div id="setup-cta" class="section setup-cta" style="display:none">
    <p>No API key set up yet.</p>
    <button id="open-settings-cta">Set up API key →</button>
  </div>

  <!-- Quick-process panel -->
  <div class="section process-section">
    <label for="input-text">Paste or type text</label>
    <textarea id="input-text" placeholder="Paste any text here and pick an action below…" rows="5"></textarea>
    <div class="action-row">
      <select id="action-select">
        <option value="fix-spelling">✓  Fix Spelling &amp; Grammar</option>
        <option value="professional">★  Make Professional</option>
        <option value="improve">↑  Improve Writing</option>
        <option value="sound-human">💬  Sound Human</option>
        <option value="brain-dump">🧠  Brain Dump → Clear Text</option>
        <option value="sound-like-me">👤  Sound Like Me</option>
        <option value="formal">    Make Formal</option>
        <option value="casual">    Make Casual</option>
        <option value="shorten">    Shorten</option>
        <option value="expand">    Expand</option>
      </select>
      <button id="process-btn">Run</button>
    </div>
    <button id="run-selection-btn" title="Process highlighted text on the current page">Process Selected Text</button>
    <div id="run-selection-status" class="run-selection-status" style="display:none"></div>
    <div id="result-area" style="display:none">
      <div id="result-loading" class="result-loading" style="display:none">
        <div class="mini-spinner"></div> Processing…
      </div>
      <div id="result-text" class="result-text"></div>
      <div id="result-actions" class="result-actions" style="display:none">
        <button id="copy-result">Copy</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Provider / model status -->
  <div class="section">
    <label for="provider">Active Provider</label>
    <select id="provider">
      <option value="openai">OpenAI</option>
      <option value="claude">Claude (Anthropic)</option>
      <option value="gemini">Google Gemini</option>
    </select>
  </div>

  <div class="section">
    <label>Model</label>
    <div id="model-display" class="model-name">—</div>
  </div>

  <div class="section">
    <label>Suggestions <span id="variants-val">1</span></label>
    <input type="range" id="variants" min="1" max="4" value="1">
    <div class="range-labels"><span>1</span><span>2</span><span>3</span><span>4</span></div>
  </div>

  <div class="section key-status" id="key-status">
    <span id="key-indicator" class="dot dot-bad"></span>
    <span id="key-text">No API key set</span>
  </div>

  <!-- Today's Activity -->
  <div class="section history-section" id="history-section" style="display:none">
    <button class="history-toggle" id="history-toggle">Today — <span id="history-count">0</span> fixes</button>
    <div id="history-list" class="history-list" style="display:none"></div>
  </div>

  <button id="open-settings">Open Full Settings</button>

  <script src="../browser-polyfill.js"></script>
  <script src="../lib/text.js"></script>
  <script src="../lib/prompts.js"></script>
  <script src="../lib/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
