<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Blur-to-Clear</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Drag handle / title bar (frameless window) -->
  <div class="titlebar" id="drag-region">
    <div class="titlebar-inner">
      <img src="../../icons/icon.svg" class="logo-img" alt="">
      <span class="title-text">Blur-to-Clear</span>
      <span class="shortcut-hint">Ctrl+Shift+Space</span>
    </div>
    <button id="close-btn" title="Hide">✕</button>
  </div>

  <!-- Process panel -->
  <div class="panel">
    <div class="input-label-row">
      <label for="input-text">Text to process</label>
      <button id="paste-btn">Paste clipboard</button>
    </div>
    <p class="input-tip">Tip: Ctrl+C text → Ctrl+Shift+Space → Ctrl+V or Paste clipboard</p>
    <textarea id="input-text"
      placeholder="Paste or type text here…"
      rows="7"
      spellcheck="false"></textarea>

    <div class="action-row">
      <select id="action-select"></select>
      <button id="run-btn">Run</button>
    </div>

    <!-- Result -->
    <div id="result-area" style="display:none">
      <div id="result-loading" class="result-loading" style="display:none">
        <div class="spinner"></div><span id="result-loading-text">Processing…</span>
      </div>
      <div id="result-slots"></div>
    </div>
  </div>

  <!-- Today's Activity -->
  <div class="history-panel pro-gate" id="history-section" style="display:none">
    <div class="pro-overlay" style="border-radius:0">
      <span class="pro-lock-icon">🔒</span>
      <p>Pro feature</p>
    </div>
    <button class="history-toggle" id="history-toggle">Today — <span id="history-count">0</span> fixes</button>
    <div id="history-list" class="history-list" style="display:none"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span id="provider-badge" class="provider-badge"></span>
    <button id="settings-btn">⚙ Settings</button>
  </div>

  <!-- Load lib scripts with paths relative to this file's location -->
  <script src="storage-shim.js"></script>
  <script src="../../lib/text.js"></script>
  <script src="../../lib/prompts.js"></script>
  <script src="../../lib/pricing.js"></script>
  <script src="../../lib/api.js"></script>
  <script src="../../lib/license.js"></script>
  <script src="popup.js"></script>
</body>
</html>
