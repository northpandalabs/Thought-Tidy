# electron-builder config for TEST ONLY CI builds.
# Produces a portable .exe (no installer) with testBuild=true injected into package.json.
# Output goes to dist-build-test/ to avoid mixing with production dist-build/.

appId: com.northpandalabs.thoughttidy
productName: Thought Tidy
copyright: "Copyright © 2026 Panda Automation LLC (NorthPanda Labs)"

directories:
  output: dist-build-test

files:
  - main.js
  - preload.js
  - ipc-handlers.js
  - lib-node/**
  - renderer/**

extraResources:
  - from: ../lib
    to: lib
  - from: ../icons
    to: icons
  - from: ../options/options.css
    to: options/options.css

extraMetadata:
  testBuild: true

win:
  target:
    - target: portable
      arch:
        - x64
  icon: ../icons/icon.png
