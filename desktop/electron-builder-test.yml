# electron-builder config for TEST ONLY CI builds.
# Produces a portable .exe AND an NSIS installer, both with testBuild=true injected.
# Output goes to dist-build-test/ to avoid mixing with production dist-build/.

appId: com.northpandalabs.thoughttidy
productName: Thought Tidy
copyright: "Copyright © 2026 Panda Automation LLC (NorthPanda Labs)"

directories:
  output: dist-build-test

files:
  - main.js
  - preload.js
  - ipc-handlers.js
  - lib-node/**
  - renderer/**

afterPack: scripts/after-pack.js

extraResources:
  - from: ../lib
    to: lib
  - from: ../icons
    to: icons
  - from: ../options/options.css
    to: options/options.css

extraMetadata:
  testBuild: true

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: ../icons/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Thought Tidy TEST"
  license: "../legal/eula.txt"
  include: build/installer.nsh
